{% extends "base.html" %}
{% block title %}Login — Eat Smart{% endblock %}
{% block content %}
<div class="card card-eat shadow-sm rounded-4 p-3 p-md-4 mx-auto" style="max-width: 24rem;">
    <div class="card-body">
        <h1 class="card-title h4 text-center mb-4">Login</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                {{ field.errors }}
                <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-eat w-100 rounded-pill">Login</button>
        </form>
        <p class="text-center small text-muted mt-3 mb-0">If you don't have an account, please Register</p>
    </div>
</div>
{% endblock %}
