{% load static %}

        <a class="navbar-brand navbar-brand-eat d-flex align-items-center me-3" href="{% url 'home' %}">
            <img src="{% static 'images/logo.png' %}" alt="Eat Smart" class="navbar-brand-logo" decoding="async">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">

        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                {% if not user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}"><i class="fa-solid fa-house me-1" aria-hidden="true"></i>Home</a>
                    </li>
                     </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'recipes:list' %}"><i class="fa-solid fa-bowl-food me-1" aria-hidden="true"></i>Recipes</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-eat btn-sm px-3 rounded-pill nav-auth-pill" href="{% url 'login' %}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-eat btn-sm px-3 rounded-pill nav-auth-pill" href="{% url 'register' %}">Register</a>
                    </li>
                {% elif nav_is_nutrition_coach %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}"><i class="fa-solid fa-house me-1" aria-hidden="true"></i>Home</a>
                    <li class="nav-item">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ingredients:list' %}"><i class="fa-solid fa-carrot me-1" aria-hidden="true"></i>Ingredients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'recipes:list' %}"><i class="fa-solid fa-bowl-food me-1" aria-hidden="true"></i>Recipes</a>
                    </li>
                     <li class="nav-item">
                        <a class="nav-link" href="{% url 'profile' %}"><i class="fa-solid fa-circle-user me-1" aria-hidden="true"></i>Profile</a>
                    </li>
                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}" class="d-inline m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-eat btn-sm px-3 rounded-pill">Logout</button>
                        </form>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}"><i class="fa-solid fa-house me-1" aria-hidden="true"></i>Home</a>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'profile' %}"><i class="fa-solid fa-circle-user me-1" aria-hidden="true"></i>Profile</a>
                    </li>
                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}" class="d-inline m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-eat btn-sm px-3 rounded-pill">Logout</button>
                        </form>
                    </li>
                {% endif %}
