{% extends "base.html" %}
{% block title %}Something went wrong — Eat Smart{% endblock %}
{% block content %}
<div class="card card-eat shadow-sm rounded-4 p-4 p-md-5 mx-auto text-center border border-warning border-opacity-50" style="max-width: 32rem;">
    <div class="card-body">
        <p class="text-muted small text-uppercase mb-2" style="letter-spacing: 0.06em;">Error 500</p>
        <h1 class="card-title h3 mb-3"><i class="fa-solid fa-triangle-exclamation text-warning me-2" aria-hidden="true"></i>Server error</h1>
        <p class="card-text text-muted mb-4">
            Something went wrong on our side. Please try again in a moment.
            If the problem continues, come back later or use the links below.
        </p>
        <div class="d-flex flex-wrap gap-2 justify-content-center">
            <a class="btn btn-eat rounded-pill px-4" href="{% url 'home' %}">Home</a>
            <a class="btn btn-outline-secondary rounded-pill px-4" href="{% url 'recipes:list' %}">Recipes</a>
        </div>
    </div>
</div>
{% endblock %}
